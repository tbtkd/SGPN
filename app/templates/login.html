<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Aurora Ángeles Nutrición</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 h-screen flex">
    <!-- Lado Izquierdo: Banner -->
    <div class="hidden lg:flex lg:w-1/2 bg-teal-700 items-center justify-center p-12">
        <div class="text-white text-center">
            <h1 class="text-4xl font-bold mb-4">AAR</h1>
            <p class="text-xl text-teal-100">Aurora Ángeles Nutrición Clínica</p>
        </div>
    </div>

    <!-- Lado Derecho: Formulario -->
    <div class="w-full lg:w-1/2 flex items-center justify-center p-8">
        <div class="w-full max-w-md">
            <h2 class="text-2xl font-bold text-gray-900 mb-8">Iniciar Sesión</h2>
            
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="{{ 'bg-green-50 text-green-700 border-green-200' if category == 'success' else 'bg-red-50 text-red-700 border-red-200' }} p-4 rounded-lg mb-6 border">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form action="{{ url_for('auth.login') }}" method="POST" class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Usuario</label>
                    <input type="text" name="username" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-teal-500 focus:border-teal-500">
                </div>
                <div x-data="{ show: false }">
                    <label class="block text-sm font-medium text-gray-700">Contraseña</label>
                    <div class="relative">
                        <input :type="show ? 'text' : 'password'" name="password" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-teal-500 focus:border-teal-500">
                        <button type="button" @click="show = !show" class="absolute right-4 top-3.5 text-gray-400 hover:text-teal-600">
                            <i class="fas" :class="show ? 'fa-eye-slash' : 'fa-eye'"></i>
                        </button>
                    </div>
                </div>
                <div class="flex gap-4">
                    <button type="submit" name="action" value="login" class="flex-1 py-3 bg-teal-600 text-white rounded-xl font-medium hover:bg-teal-700 transition">Ingresar</button>
                    <button type="submit" name="action" value="register" class="flex-1 py-3 bg-gray-100 text-gray-700 rounded-xl font-medium hover:bg-gray-200 transition">Registrarse</button>
                </div>
            </form>
        </div>
    </div>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
</body>
</html>
